<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>c0561639 - Assignment 1</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <script src="js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-primary">
    <div class="min-vh-100 d-flex flex-column justify-content-center p-3">
        <div class="d-flex justify-content-center mt-2 mb-2">
            <div class="card bg-primary-subtle justify-content-center align-items-center 
                        text-center fs-1 shadow" style="height: 5rem; width: 20rem;">Sean's Book List
            </div>
        </div>
        <div class="text-center">
            <input class="mx-auto text-center form-control shadow" style="max-width: 320px;" id="userQuery" placeholder="- Search -">
        </div>
        <div class="text-center mt-2 mb-2 mx-auto">
            <a class="btn btn-secondary shadow" href="/add.html" role="button">Add New Book</a>
        </div>
        <div class="mx-auto" style="max-width: 500px;">
            <div class="rounded-3 shadow overflow-hidden">
                <table class="table table-striped table-bordered table-primary text-center mb-0 align-middle">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Year</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>

        <script>
            //API Path
            const API = "/api/books";
            //Gets the tbody element
            const tbody = document.getElementById("tbody");
            //Gets the query user typed into search bar
            const userQuery = document.getElementById("userQuery");
            //'Live-Search' filtering
            userQuery.addEventListener("input", () => load(userQuery.value));

            //Creating load function
            async function load(query = "") {

                //Building GET request
                const res = await fetch(API);
                //Parsing JSON
                const json = await res.json();
                //Accepts both JSON data structures based on API (data: [{__}], or just [{__}])
                let rows = json.data || json;

                //Trims search and allows both lower/uppercase
                const q = query.trim().toLowerCase();
                if (q.length > 0) {
                    rows = rows.filter(b => {
                        const title = (b.title).toLowerCase();
                        const author = (b.author).toLowerCase();
                        const year = String(b.year);
                        return title.includes(q) || author.includes(q) || year.includes(q);
                    });
                }

                //Render table rows into tbody, and adds Edit & Delete buttons
                tbody.innerHTML = rows.map(m => `
                <tr>
                <td>${m.title}</td>
                <td>${m.author}</td>
                <td>${m.year}</td>
                <td>
                    <a class="btn btn-warning" href="/update.html?id=${m._id}" role="button">Edit</a>
                    <button data-id="${m._id}" class="btn btn-danger">Delete</button>
                </td>
                </tr>
            `).join("");
            }

            //Functionality for delete button
            tbody.addEventListener("click", async (e) => {
                const btn = e.target.closest('button[data-id]');
                if (!btn) return;
                //Gets the book id from the data-id on table
                const id = btn.dataset.id;
                //Getting confirmation of delete from user
                if (!confirm("Delete this book?")) return;
                //Calling DELETE method to delete data from API
                await fetch(`${API}/${id}`, { method: "DELETE" });
                //Reloads the page to show updated list
                load(userQuery.value);
            });

            load();
        </script>
    </div>
</body>

</html>
